root = "."
tmp_dir = "tmp"

[build]
  pre_cmd = ["go tool templ generate"]
  cmd = "go build -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"
  full_bin = ""
  include_ext = ["go", "tpl", "tmpl", "html", "templ", "sql"]
  exclude_dir = ["tmp", "vendor", "node_modules", "db/migrations", "2cc_sdd", "other", "public"]
  exclude_regex = ["_test\\.go$", "_templ\\.go$"]
  include_dir = []
  delay = 500
  kill_delay = "1s"
  stop_on_error = true
  send_interrupt = true

[log]
  time = false
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
