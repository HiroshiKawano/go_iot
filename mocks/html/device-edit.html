<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デバイス編集 - 農業IoTシステム</title>
  <link rel="stylesheet" href="./style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="{ navOpen: false }">
  <header class="site-header">
    <div class="header-left">
      <button type="button" class="nav-toggle" @click="navOpen = !navOpen" :aria-expanded="navOpen" aria-label="メニュー">☰</button>
      <a href="/dashboard" class="logo">🌱 農業IoT</a>
    </div>
    <div class="user-menu">
      <button type="button" class="theme-toggle" aria-pressed="false">
        <span class="icon-moon" aria-hidden="true">🌙</span>
        <span class="icon-sun" aria-hidden="true">☀️</span>
        <span class="u-visually-hidden">ダークモード切替</span>
      </button>
      <span class="user-name">テストユーザー</span>
      <form action="/logout" method="post" class="logout-form">
        <button type="submit" class="btn btn-small btn-secondary">ログアウト</button>
      </form>
    </div>
  </header>

  <aside class="sidebar" :class="{ 'is-open': navOpen }">
    <nav>
      <ul>
        <li><a href="/dashboard">🏠 ダッシュボード</a></li>
        <li><a href="/analysis/trend">📊 統計分析</a></li>
        <li><a href="/alerts/rules">🔔 アラートルール</a></li>
        <li><a href="/alerts/history">🕐 アラート履歴</a></li>
      </ul>
    </nav>
  </aside>

  <!-- モバイルドロワー開時の背面オーバーレイ（タップで閉じる） -->
  <div class="nav-backdrop" x-show="navOpen" @click="navOpen = false" x-cloak></div>

  <main class="main-content">
    <div class="main-inner">
      <div class="page-header">
        <h1>デバイス編集: ハウスA温湿度計</h1>
      </div>

      <section class="card card-narrow">
        <!-- x-data.showPlantingDate: GDD 収穫予測用(定植/播種日) の表示可否。初期値は選択中作物の GDD 対応で確定
             (ここは goya=対応ゆえ true)。栽培作物変更時に @change で更新する。 -->
        <form action="/devices/1" method="post" x-data="{ showPlantingDate: true }">
          <input type="hidden" name="_method" value="put">

          <div class="form-group">
            <label>デバイス名 <span class="required-mark">＊</span></label>
            <input type="text" name="name" value="ハウスA温湿度計" maxlength="255" required>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label>MACアドレス <span class="required-mark">＊</span></label>
            <input type="text" name="mac_address" value="AA:BB:CC:DD:EE:01" pattern="^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$" required>
            <span class="form-help">形式: XX:XX:XX:XX:XX:XX</span>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label>設置場所</label>
            <select name="locality" class="js-tom-select">
              <option value="">選択してください</option>
              <option value="那覇市">那覇市</option>
              <option value="佐敷町" selected>佐敷（南城市）</option>
              <option value="具志川市">具志川（うるま市）</option>
              <option value="国頭村">国頭村</option>
            </select>
            <span class="error-message"></span>
          </div>

          <!-- 栽培作物（任意・VPD 適正帯の切替に使用）。所在地と同型の検索可能 select。
               先頭は空 option「選択しない（既定しきい値）」＝未選択で既定帯 0.3〜1.5kPa にフォールバック。
               編集では保存済みの作物を selected で復元する（ここではゴーヤを選択中として図示）。 -->
          <div class="form-group">
            <label>栽培作物</label>
            <select name="crop" class="js-tom-select" @change="showPlantingDate = ($event.target.selectedOptions[0]?.text || '').includes('(GDD対応)')">
              <option value="">選択しない（既定しきい値）</option>
              <option value="goya" selected>ゴーヤ(GDD対応)</option>
              <option value="ingen">インゲン(GDD対応)</option>
              <option value="sugarcane">サトウキビ</option>
              <option value="mango">マンゴー</option>
              <option value="pineapple">パイナップル</option>
              <option value="uri">ウリ(GDD対応)</option>
              <option value="rice">米(GDD対応)</option>
              <option value="imo">いも(GDD対応)</option>
              <option value="leafy_vegetable">葉野菜(GDD対応)</option>
            </select>
            <span class="error-message"></span>
          </div>

          <!-- 定植/播種日（任意・空可・GDD 積算の起点）。編集時は保存値を value でプリセットする。
               作物 select の隣の素の date input（Tom Select 非対象）。GDD 対応作物選択時のみ表示（x-show/x-cloak）。 -->
          <div class="form-group" x-show="showPlantingDate" x-cloak>
            <label>GDD収穫予測用(定植/播種日)</label>
            <input type="date" name="planting_date" value="2026-04-01">
            <span class="form-help">GDD（積算温度・収穫予測）の起点。未設定でも他の項目は利用できます。</span>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label>ステータス</label>
            <div class="radio-group">
              <label><input type="radio" name="is_active" value="1" checked> 稼働中</label>
              <label><input type="radio" name="is_active" value="0"> 停止中</label>
            </div>
            <span class="error-message"></span>
          </div>

          <div class="form-actions">
            <a href="/devices/1" class="btn btn-secondary">キャンセル</a>
            <button type="submit" class="btn btn-primary">更新</button>
          </div>
        </form>
      </section>
    </div>
  </main>
  <!-- HTMX グローバルエラー通知トースト（通常は非表示。実装 App.templ では htmx:responseError / htmx:sendError 受信で JS 表示）。
       フィールド検証エラーの .error-message とは別物の .error-toast を使う（テストが error-message を検証マーカーに使うため衝突回避）。 -->
  <div id="global-error-toast" class="error-toast" role="alert" x-show="false" x-cloak>
    <span id="global-error-toast-text">エラーが発生しました。</span>
  </div>
</body>
</html>
