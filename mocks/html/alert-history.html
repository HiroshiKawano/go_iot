<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アラート履歴 - 農業IoTシステム</title>
  <link rel="stylesheet" href="./style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <header class="site-header">
    <a href="/dashboard" class="logo">🌱 農業IoT</a>
    <div class="user-menu">
      <span class="user-name">テストユーザー</span>
      <form action="/logout" method="post" class="logout-form">
        <button type="submit" class="btn btn-small btn-secondary">ログアウト</button>
      </form>
    </div>
  </header>

  <aside class="sidebar">
    <nav>
      <ul>
        <li><a href="/dashboard">🏠 ダッシュボード</a></li>
        <li><a href="/alerts/rules">🔔 アラートルール</a></li>
        <li><a href="/alerts/history" class="active">🕐 アラート履歴</a></li>
      </ul>
    </nav>
  </aside>

  <main class="main-content">
    <div class="main-inner">
      <div class="page-header">
        <h1>アラート履歴</h1>
      </div>

      <section class="card">
        <h2>フィルター</h2>
        <form action="/alerts/history" method="get" class="filter-form">
          <div class="form-group">
            <label>デバイス</label>
            <select name="device_id">
              <option value="" selected>全デバイス</option>
              <option value="1">ハウスA温湿度計</option>
              <option value="2">ハウスB温湿度計</option>
            </select>
            <span class="error-message"></span>
          </div>
          <div class="form-group">
            <label>開始日</label>
            <input type="date" name="from" value="2026-04-13">
            <span class="error-message"></span>
          </div>
          <div class="form-group">
            <label>終了日</label>
            <input type="date" name="to" value="2026-04-20">
            <span class="error-message"></span>
          </div>
          <button type="submit" class="btn btn-primary">検索</button>
        </form>
      </section>

      <h2 class="u-mbe-3">履歴一覧</h2>
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>発火日時</th>
              <th>デバイス</th>
              <th>指標</th>
              <th>ルール (条件/閾値)</th>
              <th>実測値</th>
              <th>通知</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>2026-04-20 14:30</td>
              <td>ハウスA温湿度計</td>
              <td>温度</td>
              <td>&gt; 35.00℃</td>
              <td>38.50℃</td>
              <td>済</td>
            </tr>
            <tr>
              <td>2026-04-20 13:15</td>
              <td>ハウスB温湿度計</td>
              <td>湿度</td>
              <td>&lt; 30.00%</td>
              <td>25.00%</td>
              <td>未</td>
            </tr>
            <tr>
              <td>2026-04-20 09:45</td>
              <td>ハウスA温湿度計</td>
              <td>温度</td>
              <td>&gt; 35.00℃</td>
              <td>36.20℃</td>
              <td>済</td>
            </tr>
          </tbody>
        </table>
        <p class="empty-message" style="display:none;">指定期間のアラート履歴はありません。</p>
      </div>

      <nav class="pagination">
        <span class="disabled">&larr; 前へ</span>
        <span class="current">1</span>
        <a href="?page=2">2</a>
        <a href="?page=3">3</a>
        <a href="?page=2">次へ &rarr;</a>
      </nav>
    </div>
  </main>
</body>
</html>
