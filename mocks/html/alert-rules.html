<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アラートルール管理 - 農業IoTシステム</title>
  <link rel="stylesheet" href="./style.css">
  <!-- Tom Select (TS01: head 内で CDN 読み込み、バージョン統一 2.3.1) -->
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="{ navOpen: false }">
  <header class="site-header">
    <div class="header-left">
      <button type="button" class="nav-toggle" @click="navOpen = !navOpen" :aria-expanded="navOpen" aria-label="メニュー">☰</button>
      <a href="/dashboard" class="logo">🌱 農業IoT</a>
    </div>
    <div class="user-menu">
      <span class="user-name">テストユーザー</span>
      <form action="/logout" method="post" class="logout-form">
        <button type="submit" class="btn btn-small btn-secondary">ログアウト</button>
      </form>
    </div>
  </header>

  <aside class="sidebar" :class="{ 'is-open': navOpen }">
    <nav>
      <ul>
        <li><a href="/dashboard">🏠 ダッシュボード</a></li>
        <li><a href="/alerts/rules" class="active">🔔 アラートルール</a></li>
        <li><a href="/alerts/history">🕐 アラート履歴</a></li>
      </ul>
    </nav>
  </aside>

  <!-- モバイルドロワー開時の背面オーバーレイ（タップで閉じる） -->
  <div class="nav-backdrop" x-show="navOpen" @click="navOpen = false" x-cloak></div>

  <main class="main-content">
    <div class="main-inner">
      <div class="page-header">
        <h1>アラートルール管理</h1>
      </div>

      <section class="card">
        <h2>デバイス選択</h2>
        <form action="/alerts/rules" method="get">
          <div class="form-group">
            <label>デバイス</label>
            <!-- R16/R22-2: デバイス一覧は DB 由来で件数が増えるため Tom Select を適用 -->
            <select name="device_id" class="js-tom-select">
              <option value="1" selected>ハウスA温湿度計</option>
              <option value="2">ハウスB温湿度計</option>
            </select>
            <span class="error-message"></span>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>ルール追加</h2>
        <form action="/alerts/rules" method="post" class="rule-form">
          <input type="hidden" name="device_id" value="1">
          <div class="form-group">
            <label>指標</label>
            <select name="metric">
              <option value="">選択してください</option>
              <option value="temperature" selected>温度</option>
              <option value="humidity">湿度</option>
            </select>
            <span class="error-message"></span>
          </div>
          <div class="form-group">
            <label>条件</label>
            <!-- R08: value は DB 格納値（CHECK制約: > | < | >= | <=）に合わせる。比較演算子は4値固定のため R22-2 でネイティブ select -->
            <select name="operator">
              <option value="">選択してください</option>
              <option value="&gt;" selected>より大きい</option>
              <option value="&lt;">より小さい</option>
              <option value="&gt;=">以上</option>
              <option value="&lt;=">以下</option>
            </select>
            <span class="error-message"></span>
          </div>
          <div class="form-group">
            <label>閾値</label>
            <input type="number" name="threshold" step="0.01" value="35.00" required>
            <span class="error-message"></span>
          </div>
          <button type="submit" class="btn btn-primary">ルールを追加</button>
        </form>
      </section>

      <h2 class="u-mbe-3">ルール一覧</h2>
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>有効</th>
              <th>指標</th>
              <th>条件</th>
              <th>閾値</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>
                <form action="/alerts/rules/1/toggle" method="post" class="u-d-inline">
                  <input type="hidden" name="_method" value="patch">
                  <label>
                    <input type="checkbox" name="is_enabled" value="1" checked>
                    <span class="u-visually-hidden">有効</span>
                  </label>
                </form>
              </td>
              <td>温度</td>
              <td>より大きい</td>
              <td>35.00℃</td>
              <td class="rule-list-actions">
                <a href="/alerts/rules/1/edit" class="btn btn-small btn-secondary">編集</a>
                <form action="/alerts/rules/1" method="post" class="u-d-inline">
                  <input type="hidden" name="_method" value="delete">
                  <button type="submit" class="btn btn-small btn-danger">削除</button>
                </form>
              </td>
            </tr>
            <tr>
              <td>
                <form action="/alerts/rules/2/toggle" method="post" class="u-d-inline">
                  <input type="hidden" name="_method" value="patch">
                  <label>
                    <input type="checkbox" name="is_enabled" value="1" checked>
                    <span class="u-visually-hidden">有効</span>
                  </label>
                </form>
              </td>
              <td>湿度</td>
              <td>より小さい</td>
              <td>30.00%</td>
              <td class="rule-list-actions">
                <a href="/alerts/rules/2/edit" class="btn btn-small btn-secondary">編集</a>
                <form action="/alerts/rules/2" method="post" class="u-d-inline">
                  <input type="hidden" name="_method" value="delete">
                  <button type="submit" class="btn btn-small btn-danger">削除</button>
                </form>
              </td>
            </tr>
            <tr>
              <td>
                <form action="/alerts/rules/3/toggle" method="post" class="u-d-inline">
                  <input type="hidden" name="_method" value="patch">
                  <label>
                    <input type="checkbox" name="is_enabled" value="1">
                    <span class="u-visually-hidden">有効</span>
                  </label>
                </form>
              </td>
              <td>温度</td>
              <td>より小さい</td>
              <td>5.00℃</td>
              <td class="rule-list-actions">
                <a href="/alerts/rules/3/edit" class="btn btn-small btn-secondary">編集</a>
                <form action="/alerts/rules/3" method="post" class="u-d-inline">
                  <input type="hidden" name="_method" value="delete">
                  <button type="submit" class="btn btn-small btn-danger">削除</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
        <p class="empty-message" x-show="false" x-cloak>このデバイスにはアラートルールが設定されていません。上のフォームから追加してください。</p>
      </div>
    </div>
  </main>

  <!-- Tom Select 初期化（TS02: ページ末尾に1箇所のみ・js-tom-select を一括初期化） -->
  <script>
    document.querySelectorAll('select.js-tom-select:not([disabled])').forEach(function (el) {
      new TomSelect(el, {
        allowEmptyOption: true,
        dropdownParent: 'body',
        plugins: el.multiple
          ? ['remove_button', 'dropdown_input']
          : ['dropdown_input'],
      });
    });
  </script>
</body>
</html>
